<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- D-2 — D 의 Hoefler 'a' 그대로 + 위치만 D-1 처럼 중앙으로 (y=720).
       사용자가 좋아한 D 의 'a' 모양 유지하면서 옵티컬 센터링만 개선. -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#DCD4C4"/>
      <stop offset="1" stop-color="#C9C0AF"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" fill="url(#bg)"/>
  <rect width="1024" height="1024" fill="#FFFFFF" opacity="0.05"/>

  <text x="500" y="720"
        font-family="'Hoefler Text', 'Cochin', 'Cormorant Garamond', 'Garamond', 'Times New Roman', serif"
        font-size="800"
        font-weight="400"
        text-anchor="middle"
        fill="#1F1B16">a</text>

  <circle cx="700" cy="700" r="22" fill="#B5654A"/>
</svg>
