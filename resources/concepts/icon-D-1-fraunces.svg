<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- D-1 — D 디자인의 Fraunces 폰트 변형 + 'a' 위치 옴김 (y=720, 시각 중심 ≈540).
       Fraunces (OFL) = Hoefler Text 의 OFL alternative, 모든 디바이스에서 동일 렌더 가능. -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#DCD4C4"/>
      <stop offset="1" stop-color="#C9C0AF"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" fill="url(#bg)"/>
  <rect width="1024" height="1024" fill="#FFFFFF" opacity="0.05"/>

  <text x="500" y="720"
        font-family="Fraunces, 'Hoefler Text', 'Cochin', 'Cormorant Garamond', serif"
        font-size="800"
        font-weight="400"
        text-anchor="middle"
        fill="#1F1B16">a</text>

  <circle cx="746" cy="708" r="22" fill="#B5654A"/>
</svg>
