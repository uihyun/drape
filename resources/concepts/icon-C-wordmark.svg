<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgC" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#26221C"/>
      <stop offset="1" stop-color="#1A1712"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" fill="url(#bgC)"/>

  <!-- Small atelier window monogram on top -->
  <g transform="translate(432, 280)" stroke="#F5EDE0" fill="none" stroke-linecap="round" stroke-linejoin="round" stroke-width="8">
    <path d="M 0 80 A 80 80 0 0 1 160 80 L 160 240 L 0 240 Z"/>
    <line x1="80" y1="2" x2="80" y2="240"/>
    <line x1="0" y1="160" x2="160" y2="160"/>
  </g>

  <!-- Wordmark -->
  <text x="512" y="640"
        font-family="'Hoefler Text', 'Didot', 'Cormorant Garamond', 'Garamond', serif"
        font-size="124"
        font-weight="400"
        text-anchor="middle"
        fill="#F5EDE0"
        letter-spacing="2">archelier</text>

  <!-- Gold rule beneath wordmark -->
  <line x1="412" y1="700" x2="612" y2="700" stroke="#C9A961" stroke-width="3" stroke-linecap="round"/>

  <!-- Tagline -->
  <text x="512" y="762"
        font-family="'Helvetica Neue', 'Avenir Next', 'Inter', 'Arial', sans-serif"
        font-size="28"
        font-weight="300"
        text-anchor="middle"
        fill="#F5EDE0"
        opacity="0.55"
        letter-spacing="6">A T E L I E R   ·   A I</text>
</svg>
