<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- D-1b — Fraunces with explicit opsz=14 (Text optical size).
       컨트래스트 낮음 + 본문용 형태. font-variation-settings 로 축 명시. -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#DCD4C4"/>
      <stop offset="1" stop-color="#C9C0AF"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" fill="url(#bg)"/>
  <rect width="1024" height="1024" fill="#FFFFFF" opacity="0.05"/>

  <text x="500" y="720"
        font-family="Fraunces, serif"
        font-size="800"
        font-weight="400"
        style="font-variation-settings: 'opsz' 14, 'wght' 400"
        text-anchor="middle"
        fill="#1F1B16">a</text>

  <circle cx="720" cy="708" r="22" fill="#B5654A"/>
</svg>
