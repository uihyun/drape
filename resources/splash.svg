<svg width="2732" height="2732" viewBox="0 0 2732 2732" xmlns="http://www.w3.org/2000/svg">
  <!-- Splash bg matches icon-only.svg exactly: same gradient + 5% black overlay.
       icon 과 splash 가 시각적으로 완전 동일하도록 (사용자 요구). -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#DCD4C4"/>
      <stop offset="1" stop-color="#C9C0AF"/>
    </linearGradient>
  </defs>
  <rect width="2732" height="2732" fill="url(#bg)"/>
  <rect width="2732" height="2732" fill="#1F1B16" opacity="0.05"/>
</svg>
