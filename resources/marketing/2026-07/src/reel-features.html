<meta charset="utf-8">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { width:540px; height:960px; background:#141312; overflow:hidden; position:relative; font-family:"Helvetica Neue",sans-serif; }
  .abs { position:absolute; }

  /* intro */
  #eyebrow { top:360px; left:0; right:0; text-align:center; font-size:12px; letter-spacing:5px; color:#8a857d; }
  #h1a, #h1b { left:0; right:0; text-align:center; font-family:"Didot",serif; font-style:italic; font-weight:400; color:#f2ede4; font-size:54px; line-height:1.1; }
  #h1a { top:415px; } #h1b { top:483px; }

  /* phone */
  #phone { top:105px; left:90px; width:360px; height:660px; background:#000; border-radius:46px; padding:11px; box-shadow:0 26px 60px rgba(0,0,0,.5); border:1px solid #3a3733; }
  .screen { position:absolute; inset:11px; border-radius:36px; overflow:hidden; background:#faf7f1; }
  .notch { position:absolute; top:9px; left:50%; transform:translateX(-50%); width:86px; height:20px; background:#000; border-radius:100px; z-index:9; }
  .appbar { position:absolute; top:0; left:0; right:0; display:flex; justify-content:space-between; align-items:baseline; padding:38px 16px 8px; z-index:5; background:linear-gradient(180deg,rgba(250,247,241,.95) 60%,rgba(250,247,241,0)); }
  .appbar .wm { font-family:"Didot",serif; font-style:italic; font-size:20px; color:#141312; }
  .appbar span { font-size:8px; letter-spacing:1.5px; color:#8a857d; }

  /* screen 1: closet grid */
  #sc1 .igrid { position:absolute; inset:0; display:grid; grid-template-columns:repeat(3,1fr); gap:7px; padding:78px 12px 12px; }
  #sc1 .icell { background:#fff; border-radius:10px; display:flex; align-items:center; justify-content:center; box-shadow:0 1px 3px rgba(20,19,18,.07); }
  #sc1 .icell img { width:82%; height:82%; object-fit:contain; }

  /* screen 2: outfit swap */
  #sc2 .ph { position:absolute; inset:0; }
  #sc2 .ph img { width:100%; height:100%; object-fit:cover; }
  #sc2 .chip { position:absolute; bottom:16px; left:50%; transform:translateX(-50%); font-size:9px; letter-spacing:2px; background:rgba(20,19,18,.85); color:#f2ede4; padding:7px 13px; border-radius:100px; z-index:6; white-space:nowrap; }

  /* screen 3: calendar */
  #sc3 .cal { position:absolute; inset:0; padding:82px 12px 12px; display:grid; grid-template-columns:repeat(4,1fr); grid-template-rows:repeat(4,1fr); gap:7px; }
  #sc3 .day { background:#eee8dd; border-radius:8px; position:relative; overflow:hidden; }
  #sc3 .day img { width:100%; height:100%; object-fit:cover; }
  #sc3 .day span { position:absolute; top:4px; left:5px; font-size:8px; color:#141312; background:rgba(250,247,241,.9); border-radius:4px; padding:1px 4px; z-index:2; }

  /* feature labels */
  .label { position:absolute; top:800px; left:0; right:0; text-align:center; }
  .label .num { font-size:11px; letter-spacing:4px; color:#8a857d; }
  .label .txt { font-family:"Didot",serif; font-style:italic; color:#f2ede4; font-size:30px; margin-top:8px; }

  /* outro */
  #shade { inset:0; background:#141312; }
  #wordmark { top:400px; left:0; right:0; text-align:center; font-family:"Didot",serif; font-style:italic; color:#f2ede4; font-size:110px; }
  #tagline { top:552px; left:0; right:0; text-align:center; font-size:13px; letter-spacing:3px; color:#8a857d; }
  #cta { top:618px; left:0; right:0; display:flex; justify-content:center; }
  #cta span { font-size:13px; letter-spacing:3px; color:#f2ede4; border:1px solid #4a463f; border-radius:100px; padding:14px 30px; }
</style>
<body>
  <div class="abs" id="eyebrow">D R A P E</div>
  <div class="abs" id="h1a">Your closet,</div>
  <div class="abs" id="h1b">but smarter.</div>

  <div class="abs" id="phone">
    <div class="screen" id="sc1">
      <div class="igrid">
        <div class="icell"><img src="assets/jisu3-knit.png"></div>
        <div class="icell"><img src="assets/bibi0-tee.png"></div>
        <div class="icell"><img src="seed/amy/items/item-14-x.png"></div>
        <div class="icell"><img src="assets/jisu3-skirt.png"></div>
        <div class="icell"><img src="assets/bibi0-pants.png"></div>
        <div class="icell"><img src="assets/natalie2-jeans.png"></div>
        <div class="icell"><img src="assets/bibi0-bag.png"></div>
        <div class="icell"><img src="seed/amy/items/item-8-x.png"></div>
        <div class="icell"><img src="assets/bibi0-belt.png"></div>
      </div>
      <div class="appbar"><div class="wm">drape</div><span>CLOSET · 36</span></div>
    </div>
    <div class="screen" id="sc2">
      <div class="ph" id="p0"><img src="seed/bibi/outfit-0.jpg"></div>
      <div class="ph" id="p1"><img src="seed/bibi/outfit-2.jpg"></div>
      <div class="ph" id="p2"><img src="seed/bibi/outfit-5.jpg"></div>
      <div class="chip" id="chip">MONDAY</div>
      <div class="appbar"><div class="wm">drape</div><span>STYLE</span></div>
    </div>
    <div class="screen" id="sc3">
      <div class="cal">
        <div class="day" data-i="0"><img src="seed/jisu_daily/outfit-0.jpg"><span>1</span></div>
        <div class="day" data-i="1"><img src="seed/bibi/outfit-3.jpg"><span>2</span></div>
        <div class="day" data-i="2"><img src="seed/natalie/outfit-1.jpg"><span>3</span></div>
        <div class="day" data-i="3"><img src="seed/jiyongg/outfit-3.jpg"><span>4</span></div>
        <div class="day" data-i="4"><img src="seed/rina_cafe_life/outfit-4.jpg"><span>5</span></div>
        <div class="day" data-i="5"><img src="seed/jiho/outfit-5.jpg"><span>6</span></div>
        <div class="day" data-i="6"><img src="seed/kazuki_t/outfit-3.jpg"><span>7</span></div>
        <div class="day" data-i="7"><img src="seed/bibi/outfit-5.jpg"><span>8</span></div>
        <div class="day" data-i="8"><img src="seed/jisu_daily/outfit-5.jpg"><span>9</span></div>
        <div class="day" data-i="9"><img src="seed/natalie/outfit-2.jpg"><span>10</span></div>
        <div class="day" data-i="10"><img src="seed/kenta_games_jp/outfit-4.jpg"><span>11</span></div>
        <div class="day" data-i="11"><img src="seed/jiyongg/outfit-1.jpg"><span>12</span></div>
        <div class="day" data-i="12"><img src="seed/rina_cafe_life/outfit-1.jpg"><span>13</span></div>
        <div class="day" data-i="13"><img src="seed/jiho/outfit-2.jpg"><span>14</span></div>
        <div class="day" data-i="14"><img src="seed/jisu_daily/outfit-2.jpg"><span>15</span></div>
        <div class="day" data-i="15"><img src="seed/natalie/outfit-5.jpg"><span>16</span></div>
      </div>
      <div class="appbar"><div class="wm">drape</div><span>OOTD CALENDAR</span></div>
    </div>
  </div>

  <div class="abs label" id="lb1"><div class="num">01</div><div class="txt">Every piece, catalogued.</div></div>
  <div class="abs label" id="lb2"><div class="num">02</div><div class="txt">Style it — again and again.</div></div>
  <div class="abs label" id="lb3"><div class="num">03</div><div class="txt">Every day, remembered.</div></div>

  <div class="abs" id="shade"></div>
  <div class="abs" id="wordmark">drape</div>
  <div class="abs" id="tagline">DIGITAL CLOSET · VIRTUAL TRY-ON · OOTD CALENDAR</div>
  <div class="abs" id="cta"><span>GET THE APP</span></div>

<script>
  const $ = (id) => document.getElementById(id);
  const clamp = (x) => Math.max(0, Math.min(1, x));
  const ease = (x) => { x = clamp(x); return x < .5 ? 4*x*x*x : 1 - Math.pow(-2*x + 2, 3) / 2; };
  const seg = (t, a, b) => ease((t - a) / (b - a));
  const pop = (x) => { x = clamp(x); const s = 1.7; return 1 + (Math.pow(2, -10 * x) * Math.sin((x * 10 - 0.75) * (2 * Math.PI) / 3)) * (x < 1 ? 1 : 0) * -1 * 0 + 0; };

  window.setFrame = (t) => {
    // intro 0–2.4
    const iIn = seg(t, 0.1, 0.8), iOut = seg(t, 1.9, 2.4);
    $('eyebrow').style.opacity = iIn * (1 - iOut);
    for (const [id, d] of [['h1a', 0.15], ['h1b', 0.3]]) {
      const a = seg(t, 0.1 + d, 0.85 + d), o = seg(t, 1.9, 2.4);
      $(id).style.opacity = a * (1 - o);
      $(id).style.transform = `translateY(${(1 - a) * 34 - o * 20}px)`;
    }
    // phone rises 2.3–3.0, exits via shade at end
    const ph = seg(t, 2.3, 3.0);
    $('phone').style.opacity = ph;
    $('phone').style.transform = `translateY(${(1 - ph) * 60}px)`;
    // screens visibility: sc1 until 7.1, sc2 7.1–11.6 (fade .35), sc3 after
    const s2 = seg(t, 7.1, 7.45), s3 = seg(t, 11.6, 11.95);
    $('sc1').style.opacity = 1 - s2;
    $('sc2').style.opacity = s2 * (1 - s3);
    $('sc3').style.opacity = s3;
    // sc1: items pop in staggered from 3.1
    document.querySelectorAll('#sc1 .icell').forEach((el, i) => {
      const p = seg(t, 3.1 + i * 0.17, 3.5 + i * 0.17);
      el.style.opacity = p;
      el.style.transform = `scale(${0.7 + p * 0.3})`;
    });
    // sc2: outfit swaps with slight zoom drift
    const w0 = seg(t, 8.5, 8.75), w1 = seg(t, 9.9, 10.15);
    $('p0').style.opacity = 1;
    $('p1').style.opacity = w0;
    $('p2').style.opacity = w1;
    for (const [id, a, on] of [['p0', 7.1, 1], ['p1', 8.5, w0], ['p2', 9.9, w1]]) {
      const z = 1 + clamp((t - a) / 1.6) * 0.05;
      $(id).querySelector('img').style.transform = `scale(${z})`;
    }
    const chip = $('chip');
    chip.textContent = w1 > 0.5 ? 'FRIDAY' : w0 > 0.5 ? 'WEDNESDAY' : 'MONDAY';
    chip.style.opacity = seg(t, 7.5, 7.9);
    // sc3: calendar cells pop from 12.0
    document.querySelectorAll('#sc3 .day').forEach((el) => {
      const i = +el.dataset.i;
      const p = seg(t, 12.0 + i * 0.11, 12.35 + i * 0.11);
      el.style.opacity = p;
      el.style.transform = `scale(${0.75 + p * 0.25})`;
    });
    // labels
    const l1 = seg(t, 3.0, 3.5) * (1 - seg(t, 6.7, 7.1));
    const l2 = seg(t, 7.4, 7.9) * (1 - seg(t, 11.2, 11.6));
    const l3 = seg(t, 11.9, 12.4) * (1 - seg(t, 15.1, 15.5));
    for (const [id, v] of [['lb1', l1], ['lb2', l2], ['lb3', l3]]) {
      $(id).style.opacity = v;
      $(id).style.transform = `translateY(${(1 - v) * 16}px)`;
    }
    // outro 15.5→
    const sh = seg(t, 15.5, 16.1);
    $('shade').style.opacity = sh;
    const w = seg(t, 15.9, 16.7);
    $('wordmark').style.opacity = w;
    $('wordmark').style.transform = `scale(${0.94 + w * 0.06})`;
    const tg = seg(t, 16.3, 17.0);
    $('tagline').style.opacity = tg;
    $('tagline').style.transform = `translateY(${(1 - tg) * 14}px)`;
    $('cta').style.opacity = seg(t, 16.7, 17.4);
    return 'f';
  };
  window.setFrame(0);
</script>
</body>
