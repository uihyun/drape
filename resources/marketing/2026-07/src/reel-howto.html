<meta charset="utf-8">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { width:540px; height:960px; background:#141312; overflow:hidden; position:relative; font-family:"Helvetica Neue",sans-serif; }
  .abs { position:absolute; }
  #eyebrow { top:380px; left:0; right:0; text-align:center; font-size:12px; letter-spacing:5px; color:#8a857d; }
  #h1a, #h1b { left:0; right:0; text-align:center; font-family:"Didot",serif; font-style:italic; font-weight:400; color:#f2ede4; font-size:56px; line-height:1.1; }
  #h1a { top:430px; } #h1b { top:500px; }

  /* full-bleed snap scene */
  #full { inset:0; opacity:0; }
  #full img { width:100%; height:100%; object-fit:cover; }
  #full .g { position:absolute; inset:0; background:linear-gradient(180deg,rgba(20,19,18,.3),rgba(20,19,18,0) 30%,rgba(20,19,18,0) 60%,rgba(20,19,18,.65)); }
  #scan { position:absolute; left:0; right:0; height:120px; top:-140px; background:linear-gradient(180deg,rgba(242,237,228,0),rgba(242,237,228,.35) 55%,rgba(242,237,228,.9) 78%,rgba(242,237,228,0) 82%); mix-blend-mode:screen; }
  #snapframe { position:absolute; inset:26px; border:1.5px solid rgba(242,237,228,.65); border-radius:18px; }
  #snapframe .c { position:absolute; width:26px; height:26px; border:3px solid #f2ede4; }
  #snapframe .c1 { top:-3px; left:-3px; border-right:0; border-bottom:0; border-radius:14px 0 0 0; }
  #snapframe .c2 { top:-3px; right:-3px; border-left:0; border-bottom:0; border-radius:0 14px 0 0; }
  #snapframe .c3 { bottom:-3px; left:-3px; border-right:0; border-top:0; border-radius:0 0 0 14px; }
  #snapframe .c4 { bottom:-3px; right:-3px; border-left:0; border-top:0; border-radius:0 0 14px 0; }

  /* filed scene: photo card + item grid */
  #photocard { top:88px; left:130px; width:280px; height:300px; border-radius:16px; overflow:hidden; box-shadow:0 18px 44px rgba(0,0,0,.45); opacity:0; }
  #photocard img { width:100%; height:100%; object-fit:cover; object-position:top; }
  #items { top:430px; left:50px; width:440px; display:grid; grid-template-columns:1fr 1fr; gap:14px; }
  .item { background:#f5f1ea; border-radius:14px; height:160px; display:flex; align-items:center; justify-content:center; position:relative; opacity:0; }
  .item img { width:78%; height:78%; object-fit:contain; }
  .item span { position:absolute; bottom:8px; left:0; right:0; text-align:center; font-size:8px; letter-spacing:2px; color:#8a857d; }
  #chip { top:392px; left:0; right:0; display:flex; justify-content:center; opacity:0; }
  #chip span { font-size:10px; letter-spacing:2px; background:#f2ede4; color:#141312; padding:8px 16px; border-radius:100px; font-weight:600; }

  .label { position:absolute; top:800px; left:0; right:0; text-align:center; }
  .label .num { font-size:11px; letter-spacing:4px; color:#8a857d; }
  .label .txt { font-family:"Didot",serif; font-style:italic; color:#f2ede4; font-size:30px; margin-top:8px; }

  #shade { inset:0; background:#141312; }
  #wordmark { top:400px; left:0; right:0; text-align:center; font-family:"Didot",serif; font-style:italic; color:#f2ede4; font-size:110px; }
  #tagline { top:552px; left:0; right:0; text-align:center; font-size:13px; letter-spacing:3px; color:#8a857d; }
  #cta { top:618px; left:0; right:0; display:flex; justify-content:center; }
  #cta span { font-size:13px; letter-spacing:3px; color:#f2ede4; border:1px solid #4a463f; border-radius:100px; padding:14px 30px; }
</style>
<body>
  <div class="abs" id="eyebrow">DIGITAL CLOSET</div>
  <div class="abs" id="h1a">Snap once.</div>
  <div class="abs" id="h1b">Catalogued.</div>

  <div class="abs" id="full">
    <img src="seed/bibi/outfit-0.jpg">
    <div class="g"></div>
    <div id="snapframe"><div class="c c1"></div><div class="c c2"></div><div class="c c3"></div><div class="c c4"></div></div>
    <div id="scan"></div>
  </div>

  <div class="abs" id="photocard"><img src="seed/bibi/outfit-0.jpg"></div>
  <div class="abs" id="chip"><span>+ 4 ITEMS FILED</span></div>
  <div class="abs" id="items">
    <div class="item" data-i="0"><img src="assets/bibi0-tee.png"><span>TEE</span></div>
    <div class="item" data-i="1"><img src="assets/bibi0-pants.png"><span>TROUSERS</span></div>
    <div class="item" data-i="2"><img src="assets/bibi0-bag.png"><span>BAG</span></div>
    <div class="item" data-i="3"><img src="assets/bibi0-belt.png"><span>BELT</span></div>
  </div>

  <div class="abs label" id="lb1"><div class="num">01</div><div class="txt">Snap your outfit.</div></div>
  <div class="abs label" id="lb2"><div class="num">02</div><div class="txt">drape files every piece.</div></div>

  <div class="abs" id="shade"></div>
  <div class="abs" id="wordmark">drape</div>
  <div class="abs" id="tagline">SNAP · CATALOGUE · WEAR</div>
  <div class="abs" id="cta"><span>DRAPE.NYC</span></div>

<script>
  const $ = (id) => document.getElementById(id);
  const clamp = (x) => Math.max(0, Math.min(1, x));
  const ease = (x) => { x = clamp(x); return x < .5 ? 4*x*x*x : 1 - Math.pow(-2*x + 2, 3) / 2; };
  const seg = (t, a, b) => ease((t - a) / (b - a));

  window.setFrame = (t) => {
    const iOut = seg(t, 1.9, 2.4);
    $('eyebrow').style.opacity = seg(t, 0.1, 0.8) * (1 - iOut);
    for (const [id, d] of [['h1a', 0.15], ['h1b', 0.3]]) {
      const a = seg(t, 0.1 + d, 0.85 + d);
      $(id).style.opacity = a * (1 - iOut);
      $(id).style.transform = `translateY(${(1 - a) * 34 - iOut * 20}px)`;
    }
    // full-bleed snap 2.3–5.4
    const fIn = seg(t, 2.3, 2.8), fOut = seg(t, 5.0, 5.5);
    const full = $('full');
    full.style.opacity = fIn * (1 - fOut);
    full.querySelector('img').style.transform = `scale(${1.05 - seg(t, 2.3, 5.4) * 0.05})`;
    const sf = seg(t, 2.7, 3.1);
    $('snapframe').style.opacity = sf;
    // scan sweep 3.1–4.5
    const sc = clamp((t - 3.1) / 1.4);
    $('scan').style.top = `${-140 + sc * 1160}px`;
    $('scan').style.opacity = (sc > 0 && sc < 1) ? 1 : 0;
    // filed scene 5.4→
    const pc = seg(t, 5.4, 5.95);
    $('photocard').style.opacity = pc;
    $('photocard').style.transform = `translateY(${(1 - pc) * -26}px) scale(${0.92 + pc * 0.08})`;
    $('chip').style.opacity = seg(t, 7.6, 8.0);
    document.querySelectorAll('.item').forEach((el) => {
      const i = +el.dataset.i;
      const p = seg(t, 6.0 + i * 0.28, 6.42 + i * 0.28);
      el.style.opacity = p;
      el.style.transform = `translateY(${(1 - p) * 28}px) scale(${0.82 + p * 0.18})`;
    });
    // labels
    const l1 = seg(t, 2.9, 3.4) * (1 - seg(t, 4.9, 5.3));
    const l2 = seg(t, 5.9, 6.4) * (1 - seg(t, 10.3, 10.7));
    for (const [id, v] of [['lb1', l1], ['lb2', l2]]) {
      $(id).style.opacity = v;
      $(id).style.transform = `translateY(${(1 - v) * 16}px)`;
    }
    // outro 10.8→
    const sh = seg(t, 10.8, 11.4);
    $('shade').style.opacity = sh;
    const w = seg(t, 11.2, 12.0);
    $('wordmark').style.opacity = w;
    $('wordmark').style.transform = `scale(${0.94 + w * 0.06})`;
    const tg = seg(t, 11.6, 12.3);
    $('tagline').style.opacity = tg;
    $('tagline').style.transform = `translateY(${(1 - tg) * 14}px)`;
    $('cta').style.opacity = seg(t, 12.0, 12.7);
    return 'f';
  };
  window.setFrame(0);
</script>
</body>
