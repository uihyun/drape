<meta charset="utf-8">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { width:540px; height:960px; background:#141312; overflow:hidden; position:relative; font-family:"Helvetica Neue",sans-serif; }
  .abs { position:absolute; }
  #eyebrow { top:380px; left:0; right:0; text-align:center; font-size:12px; letter-spacing:5px; color:#8a857d; }
  #h1a, #h1b { left:0; right:0; text-align:center; font-family:"Didot",serif; font-style:italic; font-weight:400; color:#f2ede4; font-size:54px; line-height:1.1; }
  #h1a { top:432px; } #h1b { top:500px; }

  #phone { top:105px; left:90px; width:360px; height:660px; background:#000; border-radius:46px; padding:11px; box-shadow:0 26px 60px rgba(0,0,0,.5); border:1px solid #3a3733; }
  .screen { position:absolute; inset:11px; border-radius:36px; overflow:hidden; background:#faf7f1; }
  .appbar { position:absolute; top:0; left:0; right:0; display:flex; justify-content:space-between; align-items:baseline; padding:38px 16px 8px; z-index:5; background:linear-gradient(180deg,rgba(250,247,241,.95) 60%,rgba(250,247,241,0)); }
  .appbar .wm { font-family:"Didot",serif; font-style:italic; font-size:20px; color:#141312; }
  .appbar span { font-size:8px; letter-spacing:1.5px; color:#8a857d; }

  /* screen 1: pick pieces */
  #sc1 .igrid { position:absolute; inset:0; display:grid; grid-template-columns:repeat(2,1fr); gap:8px; padding:80px 14px 14px; }
  #sc1 .icell { background:#fff; border-radius:12px; display:flex; align-items:center; justify-content:center; position:relative; box-shadow:0 1px 3px rgba(20,19,18,.07); }
  #sc1 .icell img { width:80%; height:80%; object-fit:contain; }
  #sc1 .check { position:absolute; top:10px; right:10px; width:26px; height:26px; border-radius:50%; background:#141312; color:#f2ede4; display:flex; align-items:center; justify-content:center; font-size:13px; opacity:0; }

  /* screen 2: results */
  #sc2 .ph { position:absolute; inset:0; }
  #sc2 .ph img { width:100%; height:100%; object-fit:cover; object-position:top; }
  #sc2 .chip { position:absolute; bottom:16px; left:50%; transform:translateX(-50%); font-size:9px; letter-spacing:2px; background:rgba(20,19,18,.85); color:#f2ede4; padding:7px 13px; border-radius:100px; z-index:6; white-space:nowrap; }

  .label { position:absolute; top:800px; left:0; right:0; text-align:center; }
  .label .num { font-size:11px; letter-spacing:4px; color:#8a857d; }
  .label .txt { font-family:"Didot",serif; font-style:italic; color:#f2ede4; font-size:30px; margin-top:8px; }

  #shade { inset:0; background:#141312; }
  #wordmark { top:400px; left:0; right:0; text-align:center; font-family:"Didot",serif; font-style:italic; color:#f2ede4; font-size:110px; }
  #tagline { top:552px; left:0; right:0; text-align:center; font-size:13px; letter-spacing:3px; color:#8a857d; }
  #cta { top:618px; left:0; right:0; display:flex; justify-content:center; }
  #cta span { font-size:13px; letter-spacing:3px; color:#f2ede4; border:1px solid #4a463f; border-radius:100px; padding:14px 30px; }
</style>
<body>
  <div class="abs" id="eyebrow">AI TRY-ON</div>
  <div class="abs" id="h1a">Never guess</div>
  <div class="abs" id="h1b">an outfit again.</div>

  <div class="abs" id="phone">
    <div class="screen" id="sc1">
      <div class="igrid">
        <div class="icell"><img src="seed/amy/items/item-9-x.png"><div class="check">✓</div></div>
        <div class="icell"><img src="seed/amy/items/item-7-x.png"><div class="check">✓</div></div>
        <div class="icell"><img src="seed/amy/items/item-10-x.png"><div class="check">✓</div></div>
        <div class="icell"><img src="seed/amy/items/item-2-x.png"><div class="check">✓</div></div>
      </div>
      <div class="appbar"><div class="wm">drape</div><span>PICK PIECES</span></div>
    </div>
    <div class="screen" id="sc2">
      <div class="ph" id="r0"><img src="seed/amy/gens/gen-6.png"></div>
      <div class="ph" id="r1"><img src="seed/amy/gens/gen-7.png"></div>
      <div class="ph" id="r2"><img src="seed/amy/gens/gen-9.png"></div>
      <div class="chip" id="chip">LOOK 1 / 3</div>
      <div class="appbar"><div class="wm">drape</div><span>AI TRY-ON</span></div>
    </div>
  </div>

  <div class="abs label" id="lb1"><div class="num">01</div><div class="txt">Pick pieces from your closet.</div></div>
  <div class="abs label" id="lb2"><div class="num">02</div><div class="txt">See them on you.</div></div>

  <div class="abs" id="shade"></div>
  <div class="abs" id="wordmark">drape</div>
  <div class="abs" id="tagline">TRY IT ON — BEFORE YOU PUT IT ON</div>
  <div class="abs" id="cta"><span>GET THE APP</span></div>

<script>
  const $ = (id) => document.getElementById(id);
  const clamp = (x) => Math.max(0, Math.min(1, x));
  const ease = (x) => { x = clamp(x); return x < .5 ? 4*x*x*x : 1 - Math.pow(-2*x + 2, 3) / 2; };
  const seg = (t, a, b) => ease((t - a) / (b - a));

  window.setFrame = (t) => {
    const iOut = seg(t, 1.9, 2.4);
    $('eyebrow').style.opacity = seg(t, 0.1, 0.8) * (1 - iOut);
    for (const [id, d] of [['h1a', 0.15], ['h1b', 0.3]]) {
      const a = seg(t, 0.1 + d, 0.85 + d);
      $(id).style.opacity = a * (1 - iOut);
      $(id).style.transform = `translateY(${(1 - a) * 34 - iOut * 20}px)`;
    }
    const ph = seg(t, 2.3, 3.0);
    $('phone').style.opacity = ph;
    $('phone').style.transform = `translateY(${(1 - ph) * 60}px)`;
    // sc1: cells pop 3.0+, checks pop 4.2+ staggered
    const s2 = seg(t, 6.6, 6.95);
    $('sc1').style.opacity = 1 - s2;
    $('sc2').style.opacity = s2;
    document.querySelectorAll('#sc1 .icell').forEach((el, i) => {
      const p = seg(t, 3.0 + i * 0.2, 3.4 + i * 0.2);
      el.style.opacity = p;
      el.style.transform = `scale(${0.75 + p * 0.25})`;
      const c = el.querySelector('.check');
      const cp = seg(t, 4.3 + i * 0.35, 4.55 + i * 0.35);
      c.style.opacity = cp;
      c.style.transform = `scale(${0.4 + cp * 0.6})`;
    });
    // sc2: results swap
    const w0 = seg(t, 8.6, 8.85), w1 = seg(t, 10.4, 10.65);
    $('r0').style.opacity = 1;
    $('r1').style.opacity = w0;
    $('r2').style.opacity = w1;
    for (const [id, a] of [['r0', 6.9], ['r1', 8.6], ['r2', 10.4]]) {
      const z = 1 + clamp((t - a) / 1.9) * 0.04;
      $(id).querySelector('img').style.transform = `scale(${z})`;
    }
    const chip = $('chip');
    chip.textContent = w1 > 0.5 ? 'LOOK 3 / 3' : w0 > 0.5 ? 'LOOK 2 / 3' : 'LOOK 1 / 3';
    chip.style.opacity = seg(t, 7.2, 7.6);
    // labels
    const l1 = seg(t, 3.1, 3.6) * (1 - seg(t, 6.2, 6.6));
    const l2 = seg(t, 7.0, 7.5) * (1 - seg(t, 12.0, 12.4));
    for (const [id, v] of [['lb1', l1], ['lb2', l2]]) {
      $(id).style.opacity = v;
      $(id).style.transform = `translateY(${(1 - v) * 16}px)`;
    }
    // outro from 12.4
    const sh = seg(t, 12.4, 13.0);
    $('shade').style.opacity = sh;
    const w = seg(t, 12.8, 13.6);
    $('wordmark').style.opacity = w;
    $('wordmark').style.transform = `scale(${0.94 + w * 0.06})`;
    const tg = seg(t, 13.2, 13.9);
    $('tagline').style.opacity = tg;
    $('tagline').style.transform = `translateY(${(1 - tg) * 14}px)`;
    $('cta').style.opacity = seg(t, 13.6, 14.3);
    return 'f';
  };
  window.setFrame(0);
</script>
</body>
