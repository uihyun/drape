<meta charset="utf-8">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { width:540px; height:675px; background:#141312; overflow:hidden; font-family:"Helvetica Neue",sans-serif; }
  .photo { position:absolute; inset:0; }
  .photo img { width:100%; height:100%; object-fit:cover; }
  .shade { position:absolute; inset:0; background:linear-gradient(180deg, rgba(20,19,18,.35) 0%, rgba(20,19,18,0) 30%, rgba(20,19,18,0) 55%, rgba(20,19,18,.82) 100%); }
  .top { position:absolute; top:26px; left:28px; right:28px; display:flex; justify-content:space-between; align-items:center; }
  .wordmark { font-family:"Didot",serif; font-style:italic; color:#f2ede4; font-size:26px; text-shadow:0 1px 12px rgba(0,0,0,.3); }
  .pill { font-size:10px; letter-spacing:2px; color:#f2ede4; border:1px solid rgba(242,237,228,.55); padding:7px 14px; border-radius:100px; backdrop-filter:blur(4px); }
  .rail { position:absolute; right:20px; bottom:170px; display:flex; flex-direction:column; gap:18px; align-items:center; }
  .rail .ic { width:44px; height:44px; border-radius:50%; background:rgba(20,19,18,.45); backdrop-filter:blur(6px); display:flex; align-items:center; justify-content:center; }
  .rail svg { width:22px; height:22px; fill:none; stroke:#f2ede4; stroke-width:1.6; }
  .rail span { color:#f2ede4; font-size:10px; margin-top:-12px; }
  .bottom { position:absolute; left:28px; right:96px; bottom:34px; color:#f2ede4; }
  .handle { display:flex; align-items:center; gap:8px; font-size:12px; font-weight:600; }
  .avatar { width:26px; height:26px; border-radius:50%; overflow:hidden; border:1px solid rgba(242,237,228,.7); }
  .avatar img { width:100%; height:100%; object-fit:cover; }
  h1 { font-family:"Didot",serif; font-style:italic; font-size:30px; font-weight:400; line-height:1.3; margin-top:12px; letter-spacing:-.3px; }
  .sub { font-size:12.5px; color:rgba(242,237,228,.75); margin-top:8px; letter-spacing:.2px; }
</style>
<body>
<div class="photo"><img src="seed/jisu_daily/outfit-3.jpg"></div>
<div class="shade"></div>
<div class="top">
  <div class="wordmark">drape</div>
  <div class="pill">OOTD</div>
</div>
<div class="rail">
  <div class="ic"><svg viewBox="0 0 24 24"><path d="M12 21s-7.5-4.8-9.5-9C1 8.5 3 5 6.5 5c2 0 3.5 1 4.5 2.5w1 0C13 6 14.5 5 16.5 5 20 5 22 8.5 20.5 12c-2 4.2-8.5 9-8.5 9z"/></svg></div>
  <span>1,204</span>
  <div class="ic"><svg viewBox="0 0 24 24"><path d="M21 12a8 8 0 1 1-3.1-6.3L21 5l-.9 3.2A8 8 0 0 1 21 12z"/></svg></div>
  <span>86</span>
</div>
<div class="bottom">
  <div class="handle"><div class="avatar"><img src="seed/jisu_daily/outfit-0.jpg"></div>@jisu_daily</div>
  <h1>What you wear today<br>becomes your archive</h1>
