<meta charset="utf-8">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { width:540px; height:675px; background:#141312; font-family:"Helvetica Neue",sans-serif; overflow:hidden; }
  .card { width:100%; height:100%; display:flex; flex-direction:column; padding:44px 40px 36px; }
  .eyebrow { font-family:"Helvetica Neue",sans-serif; font-size:10px; letter-spacing:4px; color:#8a857d; text-transform:uppercase; }
  h1 { font-family:"Didot",serif; font-style:italic; color:#f2ede4; font-size:40px; font-weight:400; line-height:1.3; margin-top:14px; letter-spacing:-.5px; }
  h1 em { font-family:"Didot",serif; font-style:italic; font-weight:400; }
  .row { flex:1; display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-top:28px; min-height:0; }
  .pane { border-radius:12px; overflow:hidden; position:relative; background:#f5f1ea; }
  .pane img { width:100%; height:100%; object-fit:cover; }
  .tag { position:absolute; bottom:10px; left:50%; transform:translateX(-50%); white-space:nowrap; font-size:10px; letter-spacing:1.5px; background:rgba(20,19,18,.85); color:#f2ede4; padding:6px 12px; border-radius:100px; backdrop-filter:blur(4px); }
  .footer { display:flex; align-items:baseline; justify-content:space-between; margin-top:30px; }
  .wordmark { font-family:"Didot",serif; color:#f2ede4; font-style:italic; font-size:32px; }
  .cta { font-family:"Helvetica Neue","Apple SD Gothic Neo",sans-serif; font-size:10px; letter-spacing:2.5px; color:#8a857d; }
</style>
<body>
<div class="card">
  <div class="eyebrow">Style Archive</div>
  <h1>Same closet,<br><em>a different look every day.</em></h1>
  <div class="row">
    <div class="pane"><img src="seed/bibi/outfit-0.jpg"><div class="tag">MON</div></div>
    <div class="pane"><img src="seed/bibi/outfit-2.jpg"><div class="tag">WED</div></div>
    <div class="pane"><img src="seed/bibi/outfit-5.jpg"><div class="tag">FRI</div></div>
  </div>
  <div class="footer">
    <div class="wordmark">drape</div>
    <div class="cta">YOUR DAILY OUTFITS, ARCHIVED</div>
  </div>
</div>
</body>
