<meta charset="utf-8">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { width:540px; height:675px; background:#141312; font-family:"Didot","Didot LT STD",serif; overflow:hidden; }
  .card { width:100%; height:100%; display:flex; flex-direction:column; padding:44px 40px 36px; }
  .eyebrow { font-family:"Helvetica Neue",sans-serif; font-size:10px; letter-spacing:4px; color:#8a857d; text-transform:uppercase; }
  h1 { color:#f2ede4; font-size:44px; font-weight:400; font-style:italic; line-height:1.12; margin-top:14px; letter-spacing:.5px; }
  .grid { flex:1; display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-top:30px; }
  .cell { background:#f5f1ea; border-radius:10px; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:10px 8px 8px; }
  .cell img { width:100%; height:100px; object-fit:contain; }
  .cell span { font-family:"Helvetica Neue",sans-serif; font-size:8px; letter-spacing:1.5px; color:#8a857d; text-transform:uppercase; margin-top:6px; }
  .footer { display:flex; align-items:baseline; justify-content:space-between; margin-top:30px; }
  .wordmark { color:#f2ede4; font-style:italic; font-size:34px; }
  .stores { font-family:"Helvetica Neue",sans-serif; font-size:9px; letter-spacing:2.5px; color:#8a857d; text-transform:uppercase; }
</style>
<body>
<div class="card">
  <div class="eyebrow">Digital Closet</div>
  <h1>Every piece you own.<br>Catalogued.</h1>
  <div class="grid">
    <div class="cell"><img src="assets/item7437.png"><span>Polo</span></div>
    <div class="cell"><img src="assets/item7438.png"><span>Linen Shirt</span></div>
    <div class="cell"><img src="assets/item7439.png"><span>Cap</span></div>
    <div class="cell"><img src="assets/item7440.png"><span>Varsity</span></div>
    <div class="cell"><img src="assets/item7442.png"><span>Chino</span></div>
    <div class="cell"><img src="assets/item7443.png"><span>Sneakers</span></div>
  </div>
  <div class="footer">
    <div class="wordmark">drape</div>
    <div class="stores">App Store &nbsp;·&nbsp; Google Play</div>
  </div>
</div>
</body>
