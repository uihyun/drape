<meta charset="utf-8">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { width:540px; height:675px; background:#f5f1ea; font-family:"Helvetica Neue",sans-serif; overflow:hidden; }
  .card { width:100%; height:100%; display:flex; flex-direction:column; padding:44px 40px 34px; }
  .eyebrow { font-size:10px; letter-spacing:4px; color:#8a857d; }
  h1 { font-family:"Didot",serif; color:#141312; font-size:44px; font-weight:400; font-style:italic; line-height:1.12; margin-top:14px; }
  .cal { flex:1; margin-top:28px; display:flex; flex-direction:column; min-height:0; }
  .dow { display:grid; grid-template-columns:repeat(7,1fr); gap:6px; font-size:8px; letter-spacing:1.5px; color:#8a857d; text-align:center; margin-bottom:8px; }
  .grid { flex:1; display:grid; grid-template-columns:repeat(7,1fr); grid-template-rows:repeat(4,1fr); gap:6px; min-height:0; }
  .day { background:#e9e3d8; border-radius:7px; position:relative; overflow:hidden; }
  .day img { width:100%; height:100%; object-fit:cover; }
  .day span { position:absolute; top:4px; left:5px; font-size:8px; color:#141312; background:rgba(245,241,234,.85); border-radius:4px; padding:1px 4px; }
  .day.empty span { background:none; color:#a49e93; }
  .footer { display:flex; align-items:baseline; justify-content:space-between; margin-top:28px; }
  .wordmark { font-family:"Didot",serif; font-style:italic; font-size:32px; color:#141312; }
  .cta { font-size:9px; letter-spacing:2.5px; color:#8a857d; text-transform:uppercase; }
</style>
