<meta charset="utf-8">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { width:540px; height:675px; background:#141312; font-family:"Helvetica Neue",sans-serif; overflow:hidden; }
  .card { width:100%; height:100%; display:flex; flex-direction:column; padding:44px 40px 36px; }
  .eyebrow { font-size:10px; letter-spacing:4px; color:#8a857d; }
  h1 { font-family:"Didot",serif; font-style:italic; color:#f2ede4; font-size:40px; font-weight:400; line-height:1.3; margin-top:14px; letter-spacing:-.5px; }
  h1 em { font-family:"Didot",serif; font-style:italic; font-weight:400; }
  .grid { flex:1; display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-top:28px; }
  .cell { background:#f5f1ea; border-radius:10px; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:10px 8px 8px; }
  .cell img { width:100%; height:100px; object-fit:contain; }
  .cell span { font-size:8px; letter-spacing:1.5px; color:#8a857d; margin-top:6px; }
  .footer { display:flex; align-items:baseline; justify-content:space-between; margin-top:30px; }
  .wordmark { font-family:"Didot",serif; color:#f2ede4; font-style:italic; font-size:34px; }
  .stores { font-size:9px; letter-spacing:2.5px; color:#8a857d; }
</style>
<body>
<div class="card">
  <div class="eyebrow">DIGITAL CLOSET</div>
  <h1>Every piece you own,<br><em>in one place.</em></h1>
  <div class="grid">
    <div class="cell"><img src="seed/amy/items/item-0-x.png"><span>SHIRT</span></div>
    <div class="cell"><img src="seed/amy/items/item-6-x.png"><span>JACKET</span></div>
    <div class="cell"><img src="seed/amy/items/item-4-x.png"><span>FLEECE</span></div>
    <div class="cell"><img src="seed/amy/items/item-5-x.png"><span>VARSITY</span></div>
    <div class="cell"><img src="seed/amy/items/item-10-x.png"><span>TROUSERS</span></div>
    <div class="cell"><img src="seed/amy/items/item-2-x.png"><span>SNEAKERS</span></div>
  </div>
  <div class="footer">
    <div class="wordmark">drape</div>
    <div class="stores">APP STORE &nbsp;·&nbsp; GOOGLE PLAY</div>
  </div>
</div>
</body>
