<meta charset="utf-8">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { width:540px; height:675px; background:#141312; overflow:hidden; font-family:"Hiragino Sans","Hiragino Kaku Gothic ProN",sans-serif; }
  .photo { position:absolute; inset:0; }
  .photo img { width:100%; height:100%; object-fit:cover; }
  .shade { position:absolute; inset:0; background:linear-gradient(180deg, rgba(20,19,18,.35) 0%, rgba(20,19,18,0) 30%, rgba(20,19,18,0) 55%, rgba(20,19,18,.85) 100%); }
  .top { position:absolute; top:26px; left:28px; right:28px; display:flex; justify-content:space-between; align-items:center; }
  .wordmark { font-family:"Didot",serif; font-style:italic; color:#f2ede4; font-size:26px; }
  .pill { font-size:10px; letter-spacing:2px; color:#f2ede4; border:1px solid rgba(242,237,228,.55); padding:7px 14px; border-radius:100px; backdrop-filter:blur(4px); }
  .bottom { position:absolute; left:28px; right:28px; bottom:34px; color:#f2ede4; }
  .handle { display:flex; align-items:center; gap:8px; font-size:12px; font-weight:600; }
  .avatar { width:26px; height:26px; border-radius:50%; overflow:hidden; border:1px solid rgba(242,237,228,.7); }
  .avatar img { width:100%; height:100%; object-fit:cover; }
  h1 { font-size:26px; font-weight:600; line-height:1.5; margin-top:12px; }
  .sub { font-size:12px; color:rgba(242,237,228,.75); margin-top:8px; letter-spacing:1px; }
</style>
<body>
<div class="photo"><img src="seed/rina_cafe_life/outfit-4.jpg"></div>
<div class="shade"></div>
<div class="top">
  <div class="wordmark">drape</div>
  <div class="pill">今日のコーデ</div>
</div>
<div class="bottom">
  <div class="handle"><div class="avatar"><img src="seed/rina_cafe_life/outfit-0.jpg"></div>@rina_cafe_life</div>
  <h1>毎日のコーデが、<br>あなたのアーカイブになる。</h1>
  <div class="sub">クローゼット · AI試着 · コーデカレンダー — drape</div>
</div>
</body>
