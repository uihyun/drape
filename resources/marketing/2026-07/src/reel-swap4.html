<meta charset="utf-8">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { width:540px; height:960px; background:#141312; overflow:hidden; position:relative; font-family:"Helvetica Neue",sans-serif; }
  .abs { position:absolute; }
  #eyebrow { top:380px; left:0; right:0; text-align:center; font-size:12px; letter-spacing:5px; color:#8a857d; }
  #h1a, #h1b { left:0; right:0; text-align:center; font-family:"Didot",serif; font-style:italic; font-weight:400; color:#f2ede4; font-size:56px; line-height:1.1; }
  #h1a { top:430px; } #h1b { top:500px; }

  .seg { position:absolute; inset:0; opacity:0; }
  .seg .before, .seg .after { position:absolute; inset:0; }
  .seg img { width:100%; height:100%; object-fit:cover; }
  .seg .line { position:absolute; top:0; bottom:0; width:2.5px; background:rgba(242,237,228,.95); box-shadow:0 0 14px rgba(0,0,0,.35); }
  .seg .g { position:absolute; inset:0; background:linear-gradient(180deg,rgba(20,19,18,.28),rgba(20,19,18,0) 28%,rgba(20,19,18,0) 62%,rgba(20,19,18,.62)); }
  .seg .cap { position:absolute; bottom:104px; left:0; right:0; text-align:center; color:#f2ede4; }
  .seg .cap .who { font-size:15px; font-weight:600; text-shadow:0 1px 8px rgba(0,0,0,.45); }
  .seg .cap .what { font-family:"Didot",serif; font-style:italic; font-size:30px; margin-top:8px; text-shadow:0 2px 12px rgba(0,0,0,.45); }
  .tagchip { position:absolute; top:96px; left:0; right:0; display:flex; justify-content:center; }
  .tagchip span { font-size:10px; letter-spacing:2px; color:#f2ede4; border:1px solid rgba(242,237,228,.6); padding:8px 15px; border-radius:100px; backdrop-filter:blur(4px); }
  #wmtop { top:26px; left:28px; font-family:"Didot",serif; font-style:italic; color:#f2ede4; font-size:24px; z-index:20; text-shadow:0 1px 10px rgba(0,0,0,.35); }

  #shade { inset:0; background:#141312; }
  #outroA { top:378px; left:0; right:0; text-align:center; font-family:"Didot",serif; font-style:italic; color:#f2ede4; font-size:46px; line-height:1.25; }
  #wordmark { top:560px; left:0; right:0; text-align:center; font-family:"Didot",serif; font-style:italic; color:#f2ede4; font-size:76px; }
  #cta { top:686px; left:0; right:0; display:flex; justify-content:center; }
  #cta span { font-size:13px; letter-spacing:3px; color:#f2ede4; border:1px solid #4a463f; border-radius:100px; padding:14px 30px; }
</style>
<body>
  <div class="abs" id="eyebrow">AI TRY-ON</div>
  <div class="abs" id="h1a">His closet.</div>
  <div class="abs" id="h1b">Your look.</div>
  <div class="abs" id="wmtop">drape</div>

  <div class="seg" data-i="0">
    <div class="before"><img src="picked/q5BmnVh7YsM3zwlaVuPn.jpg"></div>
    <div class="after"><img src="picked/r4a.png"></div>
    <div class="line"></div><div class="g"></div>
  </div>
  <div class="seg" data-i="1">
    <div class="before"><img src="picked/O7VX7wLiRNmCPob3dRyM.jpg"></div>
    <div class="after"><img src="picked/r4b.png"></div>
    <div class="line"></div><div class="g"></div>
  </div>
  <div class="seg" data-i="2">
    <div class="before"><img src="picked/FQaxf9ramT8t6ftlqVGM.jpg"></div>
    <div class="after"><img src="picked/r4c.png"></div>
    <div class="line"></div><div class="g"></div>
  </div>

  <div class="abs" id="shade"></div>
  <div class="abs" id="outroA">Try on<br>anyone's closet.</div>
  <div class="abs" id="wordmark">drape</div>
  <div class="abs" id="cta"><span>GET THE APP</span></div>

<script>
  const $ = (id) => document.getElementById(id);
  const clamp = (x) => Math.max(0, Math.min(1, x));
  const ease = (x) => { x = clamp(x); return x < .5 ? 4*x*x*x : 1 - Math.pow(-2*x + 2, 3) / 2; };
  const seg2 = (t, a, b) => ease((t - a) / (b - a));

  const START = 1.8, DUR = 3.6, N = 3;
  window.setFrame = (t) => {
    const iOut = seg2(t, 1.35, 1.8);
    $('eyebrow').style.opacity = seg2(t, 0.1, 0.7) * (1 - iOut);
    for (const [id, d] of [['h1a', 0.12], ['h1b', 0.24]]) {
      const a = seg2(t, 0.1 + d, 0.7 + d);
      $(id).style.opacity = a * (1 - iOut);
      $(id).style.transform = `translateY(${(1 - a) * 30 - iOut * 18}px)`;
    }
    const END = START + N * DUR; // 12.6
    $('wmtop').style.opacity = seg2(t, START, START + 0.4) * (1 - seg2(t, END, END + 0.4));

    document.querySelectorAll('.seg').forEach((el) => {
      const i = +el.dataset.i;
      const a = START + i * DUR;
      const local = t - a;
      const on = local >= 0 && local < DUR + 0.15;
      el.style.opacity = on ? seg2(t, a, a + 0.15) : 0;
      if (!on) return;
      // hold before 0–0.9, wipe 0.9–2.1 (L→R), hold after
      const w = seg2(local, 0.9, 2.1);
      const x = w * 100;
      el.querySelector('.after').style.clipPath = `inset(0 ${100 - x}% 0 0)`;
      const line = el.querySelector('.line');
      line.style.left = `calc(${x}% - 1px)`;
      line.style.opacity = (w > 0 && w < 1) ? 1 : 0;
      // slow zoom on both
      const z = 1.045 - clamp(local / DUR) * 0.045;
      el.querySelectorAll('img').forEach((im) => im.style.transform = `scale(${z})`);
    });

    const sh = seg2(t, END, END + 0.5);
    $('shade').style.opacity = sh;
    const oa = seg2(t, END + 0.3, END + 1.0);
    $('outroA').style.opacity = oa;
    $('outroA').style.transform = `translateY(${(1 - oa) * 18}px)`;
    $('wordmark').style.opacity = seg2(t, END + 0.8, END + 1.5);
    $('cta').style.opacity = seg2(t, END + 1.2, END + 1.8);
    return 'f';
  };
  window.setFrame(0);
</script>
</body>
