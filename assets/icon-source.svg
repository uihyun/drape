<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Drape app icon: ink background, ivory serif "D" wordmark with a single
       warm accent dot — echoes the welcome screen (black/ivory) and keeps the
       editorial serif feel the brand uses. -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1c1b19"/>
      <stop offset="1" stop-color="#0e0d0c"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" fill="url(#bg)"/>
  <!-- Serif D, optically centered -->
  <text x="496" y="512"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="660"
        font-weight="500"
        fill="#f4f1ea"
        text-anchor="middle"
        dominant-baseline="central">D</text>
  <!-- accent dot (warm terracotta, same family as the old mark) -->
  <circle cx="700" cy="690" r="46" fill="#c0694a"/>
</svg>
